services:
  - type: web
    name: jobapp-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run generate && npm run build
    startCommand: npm start
    autoDeployTrigger: checksPass
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string here during Blueprint setup
      - key: REDIS_URL
        fromService:
          name: jobapp-redis
          type: keyvalue
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false   # e.g. https://your-project.vercel.app

  - type: keyvalue
    name: jobapp-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

previews:
  generation: off
