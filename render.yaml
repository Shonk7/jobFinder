services:
  - type: web
    name: jobapp-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npm run generate && npm run build
    preDeployCommand: npx prisma db push
    startCommand: npm start
    autoDeployTrigger: checksPass
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobapp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobapp-redis
          type: keyvalue
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: jobapp-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: keyvalue
    name: jobapp-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: jobapp-postgres
    plan: free
    region: oregon
    postgresMajorVersion: "15"
    databaseName: jobapp
    user: jobapp

previews:
  generation: off
