name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ matrix.workspace }}/node_modules
          key: ${{ runner.os }}-${{ matrix.workspace }}-npm-${{ hashFiles(format('{0}/package-lock.json', matrix.workspace)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.workspace }}-npm-

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Run lint
        working-directory: ${{ matrix.workspace }}
        run: npm run lint

      - name: Run typecheck
        working-directory: ${{ matrix.workspace }}
        run: npm run typecheck

  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ matrix.workspace }}/node_modules
          key: ${{ runner.os }}-${{ matrix.workspace }}-npm-${{ hashFiles(format('{0}/package-lock.json', matrix.workspace)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.workspace }}-npm-

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm test -- --passWithNoTests
